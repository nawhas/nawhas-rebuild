# CI override: production-like `web` for Lighthouse and other jobs.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait web
#
# Compose `include` merge order is unreliable for overlapping `web.command` in some versions;
# this file only pulls in the shared web-prod slice.
include:
  - path: docker-compose.web-prod.yml
