# GitHub Actions CI Pipeline
#
# Branch protection settings (configure in GitHub repo settings):
#   - Required status checks: quality, build, docker-build
#   - Require branches to be up to date before merging
#   - No force-pushes to main
#   - No direct commits to main

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Next.js collects page data for ISR routes (e.g. /reciters/[slug]) and runs
      # generateStaticParams against PostgreSQL — same as local `docker compose` dev.
      # --wait blocks until the service healthcheck passes (see docker-compose.yml).
      - name: Start Postgres for static generation
        run: docker compose up -d --wait postgres

      - name: Apply database migrations
        run: pnpm --filter @nawhas/db db:migrate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nawhas

      - name: Build
        run: pnpm run build
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nawhas
          BETTER_AUTH_SECRET: ci-build-secret-not-for-production
          BETTER_AUTH_URL: http://localhost:3000

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: |
          timeout 60 bash -c "until curl -sf http://localhost:3000; do sleep 2; done"

      - name: Run E2E tests
        run: docker compose --profile testing run --rm -e CI=true playwright

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start infrastructure
        run: docker compose up -d postgres typesense minio

      - name: Wait for infrastructure
        run: timeout 60 bash -c "until docker compose exec -T postgres pg_isready -U postgres; do sleep 2; done"

      - name: Apply database migrations
        run: pnpm --filter @nawhas/db db:migrate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nawhas

      - name: Build production app
        run: pnpm run build
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nawhas
          BETTER_AUTH_SECRET: lighthouse-ci-secret
          BETTER_AUTH_URL: http://localhost:3000
          TYPESENSE_HOST: localhost
          TYPESENSE_PORT: "8108"
          TYPESENSE_PROTOCOL: http
          TYPESENSE_API_KEY: nawhas-typesense-key
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_BUCKET_AUDIO: nawhas-audio
          S3_BUCKET_IMAGES: nawhas-images
          S3_PUBLIC_BASE_URL: http://localhost:9000/nawhas-audio

      - name: Start production server
        run: pnpm --filter @nawhas/web start &
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nawhas
          BETTER_AUTH_SECRET: lighthouse-ci-secret
          BETTER_AUTH_URL: http://localhost:3000
          TYPESENSE_HOST: localhost
          TYPESENSE_PORT: "8108"
          TYPESENSE_PROTOCOL: http
          TYPESENSE_API_KEY: nawhas-typesense-key
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_BUCKET_AUDIO: nawhas-audio
          S3_BUCKET_IMAGES: nawhas-images
          S3_PUBLIC_BASE_URL: http://localhost:9000/nawhas-audio

      - name: Wait for app
        run: timeout 90 bash -c "until curl -sf http://localhost:3000; do sleep 2; done"

      - name: Run Lighthouse CI
        run: pnpm run perf:lighthouse
