# GitHub Actions CI Pipeline
#
# Branch protection settings (configure in GitHub repo settings):
#   - Required status checks: quality, build, docker-build, e2e
#   - Require branches to be up to date before merging
#   - No force-pushes to main
#   - No direct commits to main

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @nawhas/db build

      - name: Typecheck
        run: ./dev typecheck

      - name: Lint
        run: ./dev lint

      - name: Test
        run: ./dev test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Add nawhas.test to hosts
        run: echo "127.0.0.1 nawhas.test" | sudo tee -a /etc/hosts

      # Start all services (postgres, typesense, minio, mailpit, web). The web container
      # installs deps, builds the db package, applies migrations, and starts the dev server.
      - name: Start stack
        run: ./dev up -d

      # Wait for the web service to be ready before running the build command.
      - name: Wait for web
        run: timeout 180 bash -c "until curl -sf http://nawhas.test:3000; do sleep 2; done"

      - name: Build
        run: ./dev build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add nawhas.test to hosts
        run: echo "127.0.0.1 nawhas.test" | sudo tee -a /etc/hosts

      # Cache the Playwright Docker image (~780MB) to avoid a fresh pull on every CI run.
      # The cache key includes the full image tag so it invalidates automatically when the
      # image version changes in docker-compose.yml.
      - name: Cache Playwright Docker image
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: /tmp/playwright-cache
          key: playwright-docker-${{ runner.os }}-v1.59.1-noble

      - name: Load Playwright image from cache
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: docker load -i /tmp/playwright-cache/playwright.tar

      - name: Pull and cache Playwright image
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          docker pull mcr.microsoft.com/playwright:v1.59.1-noble
          mkdir -p /tmp/playwright-cache
          docker save mcr.microsoft.com/playwright:v1.59.1-noble \
            -o /tmp/playwright-cache/playwright.tar

      # Start with the test overlay so postgres runs the init-test-db.sh script on
      # its first boot (creates nawhas_test). Starting without the overlay first and
      # then re-applying it via `./dev test:e2e` causes Docker to recreate the
      # postgres container after its data dir is already initialised — init scripts
      # only run on a fresh data dir, so nawhas_test would never be created.
      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d

      # Web container runs: pnpm install (cold anonymous volume) + db build + db:migrate + next dev.
      # On a cold CI runner this can take several minutes. 180s is the maximum acceptable wait;
      # if the app is not ready by then, something is broken in the stack.
      - name: Wait for web
        run: |
          timeout 180 bash -c "until curl -sf http://nawhas.test:3000; do sleep 2; done"

      # Seed the database so E2E tests have real data to work with.
      - name: Seed fixtures
        run: ./dev db:seed

      - name: Run E2E tests
        run: ./dev test:e2e --ci

      - name: Docker Compose logs (web)
        if: failure()
        run: ./dev logs --no-color --tail=200 web || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Starts all infra deps (postgres, typesense, minio, mailpit) then builds the production
      # Next.js app and serves it inside the web container. --wait blocks until the web
      # healthcheck passes (defined in docker-compose.ci.yml, up to ~300s total).
      # Port 3000 is published to the host so lhci can reach http://localhost:3000.
      - name: Start production stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait web

      # Runs on the GitHub runner directly — Ubuntu runners have Chrome pre-installed and
      # Node.js available via npx, so no pnpm/node setup action is needed.
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.15 autorun
