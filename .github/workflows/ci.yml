# GitHub Actions CI Pipeline
#
# Branch protection settings (configure in GitHub repo settings):
#   - Required status checks: quality, build, docker-build, e2e
#   - Require branches to be up to date before merging
#   - No force-pushes to main
#   - No direct commits to main

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @nawhas/db build

      - name: Typecheck
        run: ./dev typecheck

      - name: Lint
        run: ./dev lint

      - name: Test
        run: ./dev test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Run next build in a fresh throwaway container so it does not conflict with
      # `next dev` (which would be running in the web service container). The web
      # service's depends_on conditions ensure postgres + typesense are healthy before
      # the build command starts. @nawhas/types must be built first so its dist/
      # declarations exist when next build type-checks.
      - name: Build
        run: |
          docker compose run --rm web sh -c "
            corepack enable &&
            pnpm install --frozen-lockfile &&
            pnpm --filter @nawhas/types build &&
            pnpm --filter @nawhas/db build &&
            pnpm --filter @nawhas/db db:migrate &&
            pnpm --filter @nawhas/web build
          "

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build web Docker image
        run: docker buildx build -f apps/web/Dockerfile . --load -t nawhas-web:ci

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add nawhas.test to hosts
        run: echo "127.0.0.1 nawhas.test" | sudo tee -a /etc/hosts

      # Cache the Playwright Docker image (~780MB) to avoid a fresh pull on every CI run.
      # The cache key includes the full image tag so it invalidates automatically when the
      # image version changes in docker-compose.yml.
      - name: Cache Playwright Docker image
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: /tmp/playwright-cache
          key: playwright-docker-${{ runner.os }}-v1.59.1-noble

      - name: Load Playwright image from cache
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: docker load -i /tmp/playwright-cache/playwright.tar

      - name: Pull and cache Playwright image
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          docker pull mcr.microsoft.com/playwright:v1.59.1-noble
          mkdir -p /tmp/playwright-cache
          docker save mcr.microsoft.com/playwright:v1.59.1-noble \
            -o /tmp/playwright-cache/playwright.tar

      # Start with -T (test overlay) so postgres runs init-test-db.sh on first boot
      # and creates nawhas_test. Starting without the overlay first would cause Docker
      # to recreate postgres mid-job, skipping the init script on a non-empty data dir.
      - name: Start stack
        run: ./dev -T up -d

      # Web container runs: pnpm install (cold anonymous volume) + db build + db:migrate + next dev.
      # On a cold CI runner this can take several minutes. 180s is the maximum acceptable wait;
      # if the app is not ready by then, something is broken in the stack.
      - name: Wait for web
        run: |
          timeout 180 bash -c "until curl -sf http://nawhas.test:3000; do sleep 2; done"

      # Seed the test database (nawhas_test). -T targets the test stack.
      - name: Seed fixtures
        env:
          SEED_MODERATOR_PASSWORD: ci-test-moderator-password
        run: ./dev -T db:seed

      - name: Run E2E tests
        run: ./dev test:e2e --ci

      - name: Docker Compose logs (web)
        if: failure()
        run: ./dev -T logs --no-color --tail=200 web || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Build + push the production Docker image to ghcr.io on every main merge.
  # The image tag is the git SHA so deploys are always traceable to a commit.
  # ──────────────────────────────────────────────────────────────────────────
  e2e-prod:
    name: E2E Tests (Production Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add nawhas.test to hosts
        run: echo "127.0.0.1 nawhas.test" | sudo tee -a /etc/hosts

      - name: Cache Playwright Docker image
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: /tmp/playwright-cache
          key: playwright-docker-${{ runner.os }}-v1.59.1-noble

      - name: Load Playwright image from cache
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: docker load -i /tmp/playwright-cache/playwright.tar

      - name: Pull and cache Playwright image
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          docker pull mcr.microsoft.com/playwright:v1.59.1-noble
          mkdir -p /tmp/playwright-cache
          docker save mcr.microsoft.com/playwright:v1.59.1-noble \
            -o /tmp/playwright-cache/playwright.tar

      - name: Start stack
        run: ./dev -T up -d

      - name: Build app for production
        run: |
          docker compose exec -T web sh -c "
            corepack enable &&
            pnpm install --frozen-lockfile &&
            pnpm --filter @nawhas/types build &&
            pnpm --filter @nawhas/db build &&
            pnpm --filter @nawhas/db db:migrate &&
            pnpm --filter @nawhas/web build
          "

      - name: Stop dev server and start production server
        run: |
          docker compose exec -T web sh -c "
            pkill -f 'next dev' || true &&
            sleep 2 &&
            pnpm --filter @nawhas/web start &
          "

      - name: Wait for production server
        run: |
          timeout 180 bash -c "until curl -sf http://nawhas.test:3000; do sleep 2; done"

      - name: Seed fixtures
        env:
          SEED_MODERATOR_PASSWORD: ci-test-moderator-password
        run: ./dev -T db:seed

      - name: Run E2E tests against production build
        run: ./dev test:e2e --ci

      - name: Docker Compose logs (web)
        if: failure()
        run: ./dev -T logs --no-color --tail=200 web || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-prod
          path: apps/e2e/playwright-report/
          retention-days: 7

  docker-push:
    name: Docker Push (ghcr.io)
    runs-on: ubuntu-latest
    needs: [quality, build, docker-build, e2e, e2e-prod]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/nawhas/nawhas-web:${{ github.sha }}
            ghcr.io/nawhas/nawhas-web:latest
          cache-from: type=gha,scope=nawhas-web
          cache-to: type=gha,mode=max,scope=nawhas-web

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy to staging via ArgoCD after the image is pushed to ghcr.io.
  # Secrets are decrypted by helm-secrets plugin at ArgoCD sync time — no
  # kubectl secrets step needed here. ArgoCD steps use continue-on-error
  # because the cluster is private and may not be reachable from GitHub Actions;
  # ArgoCD automated sync will still trigger from the git push.
  # Required GitHub secrets: ARGOCD_SERVER, ARGOCD_USERNAME, ARGOCD_PASSWORD
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        env:
          # Pin to a specific release and verify SHA256 to prevent supply chain attacks.
          # To upgrade: update ARGOCD_VERSION and ARGOCD_SHA256 together.
          ARGOCD_VERSION: "v2.13.3"
          ARGOCD_SHA256: "24699b29efe24ef7cce463b54fc0341f6496d97a7c54c9fccaa737e8eb99296f"
        run: |
          curl -sSL -o argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          echo "${ARGOCD_SHA256}  argocd" | sha256sum -c -
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Login to ArgoCD
        continue-on-error: true
        run: |
          argocd login "${{ secrets.ARGOCD_SERVER }}" \
            --username "${{ secrets.ARGOCD_USERNAME }}" \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --grpc-web \
            --insecure

      - name: Create or update ArgoCD application
        continue-on-error: true
        run: |
          argocd app create nawhas-staging \
            --repo https://github.com/nawhas/nawhas-rebuild.git \
            --path deploy/helm/nawhas \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace nawhas-staging \
            --values values.yaml \
            --values values-staging.yaml \
            --helm-set image.tag=${{ github.sha }} \
            --sync-policy automated \
            --auto-prune \
            --upsert

      - name: Set image tag and sync
        continue-on-error: true
        run: |
          argocd app set nawhas-staging \
            --helm-set "image.tag=${{ github.sha }}"
          argocd app sync nawhas-staging --timeout 300
          argocd app wait nawhas-staging --health --timeout 300

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Starts all infra deps (postgres, typesense, minio, mailpit) then builds the production
      # Next.js app and serves it inside the web container. --wait blocks until the web
      # healthcheck passes (defined in docker-compose.ci.yml, up to ~300s total).
      # Port 3000 is published to the host so lhci can reach http://localhost:3000.
      - name: Start production stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait web

      # Runs on the GitHub runner directly — Ubuntu runners have Chrome pre-installed and
      # Node.js available via npx, so no pnpm/node setup action is needed.
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.15 autorun
