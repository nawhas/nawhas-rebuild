# GitHub Actions CI Pipeline
#
# Branch protection settings (configure in GitHub repo settings):
#   - Required status checks: quality, build, docker-build, e2e
#   - Require branches to be up to date before merging
#   - No force-pushes to main
#   - No direct commits to main

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # All quality checks run inside the web container so there is no runner-side
      # pnpm/node setup. --no-deps skips starting postgres/typesense/etc since
      # typecheck, lint, and unit tests do not need a running database.
      - name: Run quality checks
        run: |
          docker compose run --rm --no-deps web sh -c "
            corepack enable &&
            pnpm install --frozen-lockfile &&
            pnpm --filter @nawhas/db build &&
            pnpm run typecheck &&
            pnpm run lint &&
            pnpm run test
          "

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # docker compose run respects depends_on conditions — postgres, typesense, minio, and mailpit
      # are started and waited on (health checks) before the build command runs. No runner-side
      # pnpm/node setup needed; all env vars come from the web service in docker-compose.yml.
      - name: Build
        run: |
          docker compose run --rm web sh -c "
            corepack enable &&
            pnpm install --frozen-lockfile &&
            pnpm --filter @nawhas/db build &&
            pnpm --filter @nawhas/db db:migrate &&
            pnpm run build
          "

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d

      # Web container runs: pnpm install (cold anonymous volume) + db build + db:migrate + next dev.
      # On a cold CI runner this can take several minutes. 180s is the maximum acceptable wait;
      # if the app is not ready by then, something is broken in the stack.
      - name: Wait for web
        run: |
          timeout 180 bash -c "until curl -sf http://localhost:3000; do sleep 2; done"

      - name: Run E2E tests
        run: docker compose --profile testing run --rm -e CI=true playwright

      - name: Docker Compose logs (web)
        if: failure()
        run: docker compose logs --no-color --tail=200 web || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Starts all infra deps (postgres, typesense, minio, mailpit) then builds the production
      # Next.js app and serves it inside the web container. --wait blocks until the web
      # healthcheck passes (defined in docker-compose.ci.yml, up to ~300s total).
      # Port 3000 is published to the host so lhci can reach http://localhost:3000.
      - name: Start production stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait web

      # Runs on the GitHub runner directly — Ubuntu runners have Chrome pre-installed and
      # Node.js available via npx, so no pnpm/node setup action is needed.
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.15 autorun
