# GitHub Actions CI Pipeline
#
# Branch protection (configure in GitHub repo settings):
#   - Recommended required checks: Quality, Build, Docker Build (job names below).
#   - E2E Tests: keep running on every PR/push for HTTP-level regressions, but it does
#     NOT gate docker-push or deploy-staging (see job `needs:`). Omit E2E from required
#     checks if merges/deploys from main should not wait on Playwright.
#   - Require branches to be up to date before merging
#   - No force-pushes to main
#   - No direct commits to main

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Typecheck, lint, test (Docker)
        run: ./dev qa

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Run next build in a fresh throwaway container so it does not conflict with
      # `next dev` (which would be running in the web service container). The web
      # service's depends_on conditions ensure postgres + typesense are healthy before
      # the build command starts. @nawhas/types must be built first so its dist/
      # declarations exist when next build type-checks.
      #
      # Note: this job compiles and prerenders against an empty/migrated DB (no seed).
      # ISR `generateStaticParams` often returns [] here; runtime-only RSC issues are
      # more likely to surface in the E2E job (prod-like stack + seed + HTTP).
      - name: Build
        run: |
          docker compose run --rm web sh -c "
            corepack enable &&
            pnpm install --frozen-lockfile &&
            pnpm --filter @nawhas/types build &&
            pnpm --filter @nawhas/db build &&
            pnpm --filter @nawhas/ui build &&
            pnpm --filter @nawhas/db db:migrate &&
            pnpm --filter @nawhas/web build
          "

  prodlike-smoke:
    name: Production-like Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run production-like smoke checks
        env:
          SEED_MODERATOR_PASSWORD: ci-test-moderator-password
        run: ./dev smoke:prodlike

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build web Docker image
        uses: ./.github/actions/build-web-image
        with:
          tags: nawhas-web:ci
          load: "true"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add nawhas.test to hosts
        run: echo "127.0.0.1 nawhas.test" | sudo tee -a /etc/hosts

      # Cache the Playwright Docker image (~780MB) to avoid a fresh pull on every CI run.
      # The cache key includes the full image tag so it invalidates automatically when the
      # image version changes in docker-compose.yml.
      - name: Cache Playwright Docker image
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: /tmp/playwright-cache
          key: playwright-docker-${{ runner.os }}-v1.59.1-noble

      - name: Load Playwright image from cache
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: docker load -i /tmp/playwright-cache/playwright.tar

      - name: Pull and cache Playwright image
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          docker pull mcr.microsoft.com/playwright:v1.59.1-noble
          mkdir -p /tmp/playwright-cache
          docker save mcr.microsoft.com/playwright:v1.59.1-noble \
            -o /tmp/playwright-cache/playwright.tar

      # Base + test overlay + CI overlay (ci.yml includes docker-compose.web-prod.yml for prod-like web).
      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.ci.yml up -d --wait web

      # Seed the test database (nawhas_test). -T targets the test stack.
      - name: Seed fixtures
        env:
          SEED_MODERATOR_PASSWORD: ci-test-moderator-password
        run: ./dev -T db:seed

      - name: Run E2E tests
        run: ./dev test:e2e --ci

      - name: Docker Compose logs (web)
        if: failure()
        run: ./dev -T logs --no-color --tail=200 web || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

  # Docker Push + Deploy to Staging live in .github/workflows/deploy-staging.yml.
  # That workflow triggers independently on push:main + workflow_dispatch
  # and runs in parallel with CI, so flaky E2E or Lighthouse runs here
  # don't block deploys.

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Starts all infra deps (postgres, typesense, minio, mailpit) then builds the production
      # Next.js app and serves it inside the web container. --wait blocks until the web
      # healthcheck passes (defined in docker-compose.ci.yml, up to ~300s total).
      # Port 3100 is published to the host so lhci can reach http://localhost:3100.
      - name: Start production stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait web

      # Runs on the GitHub runner directly — Ubuntu runners have Chrome pre-installed and
      # Node.js available via npx, so no pnpm/node setup action is needed.
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.15 autorun
