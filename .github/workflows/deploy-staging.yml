# Build + deploy the web image to staging.
#
# Triggers directly on pushes to main (not via workflow_run from CI), so
# flaky E2E or Lighthouse runs in ci.yml don't gate deploys — matching
# the old job-level `needs: [docker-push]` semantics where only
# quality + build + docker-build had to pass to deploy. Those jobs still
# run in ci.yml in parallel with this workflow and surface their results
# independently.
#
# CI owns sync: the ArgoCD application is created without an automated
# sync policy, so deploys happen only when this workflow explicitly runs
# `argocd app sync`. Eliminates races between the Argo controller and
# CI that produced `FailedPrecondition: another operation is already in
# progress` errors.
#
# ArgoCD steps use continue-on-error because the cluster is private and
# may not be reachable from GitHub Actions runners. With auto-sync off,
# a skipped run means no deploy — surface failures by watching the
# staging environment on the workflow page.
#
# Required GitHub secrets: ARGOCD_SERVER, ARGOCD_USERNAME, ARGOCD_PASSWORD

name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: main

jobs:
  docker-push:
    name: Docker Push (ghcr.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      # Always tag the pushed image with the full commit SHA. For
      # push:main github.sha matches, but workflow_dispatch with
      # ref=main needs to resolve to the actual SHA that branch points
      # to so downstream deploy has a valid ghcr.io tag.
      - name: Resolve commit SHA
        id: tag
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: ./.github/actions/build-web-image
        with:
          push: "true"
          tags: |
            ghcr.io/nawhas/nawhas-web:${{ steps.tag.outputs.sha }}
            ghcr.io/nawhas/nawhas-web:latest

  deploy:
    name: Deploy to Staging
    needs: docker-push
    runs-on: ubuntu-latest
    environment: staging
    # Serialize deploys. Without this, two quick pushes to main queue
    # two `argocd app sync` calls against the same app, and the second
    # one fails with "another operation is already in progress"
    # (FailedPrecondition, exit 20). cancel-in-progress: false means
    # newer runs wait rather than kill an in-flight deploy mid-sync.
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    env:
      IMAGE_TAG: ${{ needs.docker-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up ArgoCD
        continue-on-error: true
        uses: ./.github/actions/argocd-setup
        with:
          server: ${{ secrets.ARGOCD_SERVER }}
          username: ${{ secrets.ARGOCD_USERNAME }}
          password: ${{ secrets.ARGOCD_PASSWORD }}

      - name: Create or update ArgoCD application
        continue-on-error: true
        run: |
          # --upsert replaces the full spec. Omitting --sync-policy here
          # clears any previously-configured automated sync on the app,
          # so the explicit `argocd app sync` step below is the only
          # trigger.
          argocd app create nawhas-staging \
            --repo https://github.com/nawhas/nawhas-rebuild.git \
            --path deploy/helm/nawhas \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace nawhas-staging \
            --values values.yaml \
            --values values-staging.yaml \
            --helm-set image.tag=${{ env.IMAGE_TAG }} \
            --upsert

          # Defensive: explicitly strip any lingering automated sync
          # settings that the first run of this workflow after the
          # change may have inherited. Safe no-op once the spec is
          # already manual.
          argocd app unset nawhas-staging --sync-policy || true

      - name: Set image tag and sync
        continue-on-error: true
        run: |
          argocd app set nawhas-staging \
            --helm-set "image.tag=${{ env.IMAGE_TAG }}"

          # Defensive: cancel any in-flight op from a stuck previous run,
          # a manual sync kicked off in the ArgoCD UI, or the one-time
          # race while transitioning off automated sync. Safe no-op when
          # nothing is running.
          argocd app terminate-op nawhas-staging || true

          for attempt in 1 2 3; do
            if argocd app sync nawhas-staging --timeout 300; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "argocd app sync failed after 3 attempts"
              exit 1
            fi
            delay=$((attempt * 10))
            echo "sync attempt $attempt failed; retrying in ${delay}s"
            sleep "$delay"
            argocd app terminate-op nawhas-staging || true
          done

          argocd app wait nawhas-staging --health --timeout 300
