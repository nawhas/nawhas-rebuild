# TEST OVERLAY — layers on top of docker-compose.yml when running E2E tests.
#
# Usage (local):
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.test.yml --profile testing run --rm playwright
#
# Usage (CI): see .github/workflows/ci.yml e2e job.
#
# What this changes vs the base file:
#   - postgres: mounts an init script that creates the nawhas_test database
#   - web: points DATABASE_URL at nawhas_test, sets BETTER_AUTH_URL/TRUSTED_ORIGINS
#     to http://nawhas.test:3000, and adds nawhas.test as a Docker network alias
#   - playwright: overrides BASE_URL + DATABASE_URL for test DB; Typesense vars live
#     here (not in the base file) so dev docker compose up stays clean
services:
  postgres:
    volumes:
      - ./infra/postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro

  web:
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nawhas_test
      - BETTER_AUTH_URL=http://nawhas.test:3000
      - BETTER_AUTH_TRUSTED_ORIGINS=http://nawhas.test:3000,http://localhost:3000
      # Align client auth baseURL with browser origin in E2E (matches BETTER_AUTH_URL).
      - NEXT_PUBLIC_APP_URL=http://nawhas.test:3000
      # Limit the DB pool per getDb() instance to 3. Next.js dev HMR can re-evaluate
      # the module and create a fresh pool on each reload. 10 connections × many reloads
      # over an 18-minute CI run exhausts max_connections=200, causing "too many clients"
      # errors that cascade to test failures. 3 × ~60 HMR reloads ≈ 180 < 200.
      - DATABASE_POOL_MAX=3
      # Release idle connections after 30s so connections from stale HMR pools
      # are eventually freed even if the pool is never explicitly ended.
      - DATABASE_IDLE_TIMEOUT=30
    networks:
      default:
        aliases:
          - nawhas.test

  playwright:
    environment:
      - BASE_URL=http://nawhas.test:3000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nawhas_test
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_API_KEY=nawhas-typesense-key
