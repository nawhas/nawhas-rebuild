# TEST OVERLAY — layers on top of docker-compose.yml for the test database and E2E.
#
# Local dev with test DB:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#
# Local E2E (Next dev in Docker + Playwright):
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --wait web
#   docker compose -f docker-compose.yml -f docker-compose.test.yml --profile testing run --rm --no-deps playwright
#   Or: ./dev test:e2e
#
# Production-like E2E (CI / ./dev test:e2e --ci) — add docker-compose.ci.yml (includes web-prod):
#   docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.ci.yml …
#
# What this file defines:
#   - postgres: init script for nawhas_test
#   - web: DATABASE_URL → nawhas_test, BETTER_AUTH / NEXT_PUBLIC URLs, pool limits, nawhas.test alias
#   - playwright: full E2E runner (profile `testing`); only exists when this overlay is used
services:
  postgres:
    volumes:
      - ./infra/postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro

  web:
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nawhas_test
      - INTERNAL_LISTEN_PORT=3000
      - BETTER_AUTH_URL=http://nawhas.test:3000
      - BETTER_AUTH_TRUSTED_ORIGINS=http://nawhas.test:3000,http://localhost:3000
      # Align client auth baseURL with browser origin in E2E (matches BETTER_AUTH_URL).
      - NEXT_PUBLIC_APP_URL=http://nawhas.test:3000
      # Better Auth enables rate limiting when NODE_ENV=production (CI prod-like web).
      - E2E_DISABLE_AUTH_RATE_LIMIT=true
      # Limit the DB pool per getDb() instance to 3. Next.js dev HMR can re-evaluate
      # the module and create a fresh pool on each reload. 10 connections × many reloads
      # over an 18-minute CI run exhausts max_connections=200, causing "too many clients"
      # errors that cascade to test failures. 3 × ~60 HMR reloads ≈ 180 < 200.
      - DATABASE_POOL_MAX=3
      # Release idle connections after 30s so connections from stale HMR pools
      # are eventually freed even if the pool is never explicitly ended.
      - DATABASE_IDLE_TIMEOUT=30
    networks:
      default:
        aliases:
          - nawhas.test

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    profiles:
      - testing
    working_dir: /app
    # Install deps fresh inside the container so pnpm symlinks resolve correctly.
    # The host's node_modules use symlinks into .pnpm virtual store which breaks
    # when /app/node_modules is masked by the anonymous volume below.
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @nawhas/e2e test:e2e"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/e2e/node_modules
    environment:
      - BASE_URL=http://nawhas.test:3000
      - DOCKER=true
      - CI=${CI:-}
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nawhas_test
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_API_KEY=nawhas-typesense-key
    depends_on:
      web:
        condition: service_healthy
