# Base values — all optional infrastructure disabled by default.
# Override with values-staging.yaml or values-production.yaml.

image:
  repository: ghcr.io/nawhas/nawhas-web
  tag: "latest"           # overridden by CI at deploy time with git SHA
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  host: nawhas.cititech.tech
  tls: false
  tlsSecretName: nawhas-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cloudflare.com/dns-enabled: "true"

# Optional infrastructure toggles — disabled by default
minio:
  enabled: false
  host: ""
  port: 9000
  consolePort: 9001
  storage: 10Gi
  rootUser: nawhas-admin   # override via secret (MINIO_ROOT_USER)
  rootPassword: ""         # always from secret (MINIO_ROOT_PASSWORD)

seed:
  enabled: false   # set true on environments that need sample data

# One-shot Helm hook Job: reconcile Typesense collection schemas (create missing, recreate if outdated).
# Runs before the seed hook (weight 5 vs 10). Disable only if you manage Typesense schemas entirely out-of-band.
typesenseSchemaJob:
  enabled: true

mailhog:
  enabled: false   # MailHog SMTP trap for staging

pgbouncer:
  enabled: false
  maxClientConn: 100
  defaultPoolSize: 20

# Standalone PostgreSQL StatefulSet (docker.io/library/postgres:16) — disabled by default.
# Production should use an external managed PostgreSQL (RDS/Cloud SQL/etc.).
# Password is read from the K8s Secret at .Values.secretName (key: POSTGRES_PASSWORD).
postgresql:
  enabled: false
  auth:
    database: nawhas
    username: nawhas
  primary:
    persistence:
      storageClass: ""
      size: 10Gi

# Typesense search engine — disabled by default.
# API key is read from the K8s Secret at .Values.secretName (key: TYPESENSE_API_KEY).
typesense:
  enabled: false
  # Matches the Typesense server version used in local dev (docker-compose.yml).
  # Only affects environments with typesense.enabled=true (currently staging);
  # production runs Typesense out-of-band (enabled:false) and is unaffected.
  image: docker.io/typesense/typesense:28.0
  port: 8108
  storage:
    storageClass: ""
    size: 5Gi

# Resource limits — required on all K8s deployments
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Application environment — non-secret values only.
# Secrets are injected from the SOPS-encrypted secrets file via a K8s Secret.
env:
  NEXT_PUBLIC_BASE_URL: "https://nawhas.cititech.tech"
  # Same origin as BASE_URL — Better Auth client uses NEXT_PUBLIC_APP_URL when set.
  NEXT_PUBLIC_APP_URL: "https://nawhas.cititech.tech"
  NODE_ENV: "production"
  PORT: "3000"
  LOGGING_ENABLED: "true"
  NEXT_PUBLIC_LOGGING_ENABLED: "true"
  LOG_LEVEL: "info"
  LOG_SINK: "console"
  LOG_FILE_PATH: "/tmp/nawhas-web.log"

# Name of the K8s Secret (created from SOPS-decrypted secrets) that holds all secret env vars
secretName: nawhas-secrets

# Namespace to deploy into
namespace: nawhas

# Image pull secret name (if using ghcr.io with auth)
imagePullSecrets: []
