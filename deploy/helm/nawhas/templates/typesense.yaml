{{- if .Values.typesense.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nawhas-typesense
  namespace: {{ .Values.namespace }}
spec:
  serviceName: nawhas-typesense
  replicas: 1
  selector:
    matchLabels:
      app: nawhas-typesense
  template:
    metadata:
      labels:
        app: nawhas-typesense
    spec:
      containers:
        - name: typesense
          image: docker.io/typesense/typesense:27.1
          args:
            - --data-dir=/data
            - --api-key=$(TYPESENSE_API_KEY)
            - --enable-cors
          env:
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: TYPESENSE_API_KEY
          ports:
            - containerPort: 8108
          volumeMounts:
            - name: typesense-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8108
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8108
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: typesense-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.typesense.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.typesense.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: nawhas-typesense
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: nawhas-typesense
  ports:
    - port: 8108
      targetPort: 8108
{{- end }}
