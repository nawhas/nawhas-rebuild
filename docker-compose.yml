# FOR LOCAL DEVELOPMENT ONLY
services:
  web:
    image: node:20-alpine
    working_dir: /app
    # Install workspace deps, build the @nawhas/db package (dist/ is gitignored so must be compiled
    # before next dev imports it), apply Drizzle migrations, then start the dev server.
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @nawhas/db build && pnpm --filter @nawhas/db db:migrate && pnpm --filter @nawhas/web dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nawhas
      - BETTER_AUTH_SECRET=change-me-in-production-use-a-long-random-secret
      - BETTER_AUTH_URL=http://nawhas.test:3000
      - BETTER_AUTH_TRUSTED_ORIGINS=http://nawhas.test:3000,http://localhost:3000
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
      - TYPESENSE_API_KEY=nawhas-typesense-key
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_AUDIO=nawhas-audio
      - S3_BUCKET_IMAGES=nawhas-images
      - S3_PUBLIC_BASE_URL=http://localhost:9000/nawhas-audio
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=noreply@nawhas.com
      - SMTP_SECURE=false
    networks:
      default:
        aliases:
          - nawhas.test
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    command: postgres -c max_connections=200
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nawhas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:26.0
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: nawhas-typesense-key
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8108'"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Server-level CORS: allows any origin to make cross-origin requests to
      # MinIO. Required for Howler.js crossOrigin="anonymous" audio streaming.
      # mc cors set does not work with MinIO CE — use this env var instead.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the nawhas-audio and nawhas-images buckets on first startup,
  # sets anonymous download access, and applies a CORS policy so browsers
  # can fetch audio cross-origin (required for Howler.js crossOrigin mode).
  # Runs once and exits — web depends on service_completed_successfully.
  minio-init:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio/init.sh:/init.sh:ro
    entrypoint: /bin/sh /init.sh

  mailpit:
    image: axllent/mailpit:v1.24
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8025/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  typesense_data:
  minio_data:
